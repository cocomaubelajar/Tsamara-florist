<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulakan - Tsamara Florist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="nav-brand">🌸 Tsamara <span>Florist</span></span>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="penjualan.html" class="nav-link">🌿 Penjualan</a>
    <a href="kulakan.html" class="nav-link">🛒 Kulakan</a>
    <a href="pesanan.html" class="nav-link">📋 Pesanan</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="title">🛒 Daftar <span>Kulakan</span></div>
    <div class="sub">Belanja Tanaman & Kebutuhan Kios</div>
  </div>

  <div class="card orange">
    <div class="card-title">Tambah Item Kulakan</div>
    <div class="form-grid">
      <div class="form-full">
        <label>Nama Tanaman / Barang</label>
        <input type="text" id="kulakanNama" placeholder="cth: Asoka, Pot, Pupuk..." />
      </div>
      <div>
        <label>Jumlah</label>
        <input type="number" id="kulakanJumlah" value="1" min="1" />
      </div>
      <div>
        <label>Satuan</label>\n        <input type="text" id="kulakanSatuan" value="pcs" placeholder="pcs / ikat / karung..." />
      </div>
      <div class="form-full">
        <label>Catatan Tambahan (Opsional)</label>\n        <input type="text" id="kulakanDesc" placeholder="cth: yang warna merah / cari ukuran jumbo..." />
      </div>
    </div>
    <button class="btn btn-orange" onclick="tambahKulakan()" style="margin-top: 15px;">➕ Tambah ke Daftar Belanja</button>
  </div>

  <div class="card">
    <div class="card-title-flex">
      <span>📋 Rencana Daftar Belanja</span>
      <button class="btn btn-dark-green btn-sm" onclick="shareKulakan()">🚀 Kirim Update Daftar Belanja</button>
    </div>
    <div id="kulakanList" class="item-list-container"></div>
  </div>
</div>

<script src="share.js"></script>
<script>
  let kulakan = JSON.parse(localStorage.getItem('riwayatKulakan')) || [];

  function renderKulakan() {
    const el = document.getElementById('kulakanList');
    if (kulakan.length === 0) {
      el.innerHTML = '<div class="empty-state">Daftar belanja masih kosong, aman! 🎉</div>';
      return;
    }

    // Urutkan yang belum dibeli ditaruh di atas
    el.innerHTML = kulakan.map((k, index) => `
      <div class="item-row ${k.status === 'sudah' ? 'checked-item' : ''}" style="${k.status === 'sudah' ? 'opacity:0.55;' : ''}">
        <div class="item-info">
          <div class="item-name">${k.status === 'sudah' ? '✅' : '📌'} <strong>${k.nama}</strong></div>
          <div class="item-desc">📦 Kebutuhan: ${k.jumlah} ${k.satuan}</div>
          ${k.deskripsi ? `<div class="item-desc" style="font-style:italic;">📝 Catatan: ${k.deskripsi}</div>` : ''}
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
          ${k.status === 'belum' ? `<button class="btn-action btn-check" onclick="toggleStatus(${index})">✔️ Selesai</button>` : ''}
          <button class="btn-action btn-del" onclick="hapusKulakan(${index})">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  function tambahKulakan() {
    const nama = document.getElementById('kulakanNama').value.trim();
    const jumlah = parseInt(document.getElementById('kulakanJumlah').value) || 0;
    const satuan = document.getElementById('kulakanSatuan').value.trim() || 'pcs';
    const deskripsi = document.getElementById('kulakanDesc').value.trim();

    if (!nama || jumlah <= 0) {
      showToast('Nama barang dan jumlah belanja wajib diisi!', true);
      return;
    }

    kulakan.push({ nama, jumlah, satuan, deskripsi, status: 'belum' });
    saveAndRender();

    // Reset Form
    document.getElementById('kulakanNama').value = '';
    document.getElementById('kulakanJumlah').value = '1';
    document.getElementById('kulakanDesc').value = '';
    showToast('Item berhasil dimasukkan daftar rencana belanja.');
  }

  function toggleStatus(index) {
    kulakan[index].status = 'sudah';
    saveAndRender();
    showToast('Barang berhasil ditandai telah dibeli!');
  }

  function hapusKulakan(index) {
    kulakan.splice(index, 1);
    saveAndRender();
    showToast('Item dihapus dari daftar.');
  }

  function saveAndRender() {
    localStorage.setItem('riwayatKulakan', JSON.stringify(kulakan));
    renderKulakan();
  }

  function shareKulakan() {
    if (kulakan.length === 0) {
      showToast('Tidak ada daftar belanja kulakan untuk dikirim!', true);
      return;
    }

    const belum = kulakan.filter(k => k.status === 'belum');
    const sudah = kulakan.filter(k => k.status === 'sudah');
    const d = getNow();

    let msg = `*DAFTAR KULAKAN TSAMARA FLORIST*\n`;
    msg += `📅 Tanggal: ${formatDateLong(d)}\n`;
    msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;

    if (belum.length > 0) {
      msg += `*❌ BELUM DIBELI:*\n`;
      belum.forEach((k, i) => {
        msg += `${i+1}. *${k.nama}* (${k.jumlah} ${k.satuan})`;
        if (k.deskripsi) msg += ` — _${k.deskripsi}_`;
        msg += `\n`;
      });
    }

    if (sudah.length > 0) {
      msg += `\n*✅ SUDAH BERHASIL DIBELI:*\n`;
      sudah.forEach((k, i) => {
        msg += `• ~${k.nama}~ (${k.jumlah} ${k.satuan})\n`;
      });
    }

    msg += `\n━━━━━━━━━━━━━━━━━━━━\n`;
    msg += `📊 Status: ${belum.length} Belum dibeli · ${sudah.length} Selesai\n\n`;
    msg += `_Tsamara Florist_ 🌸`;

    openWhatsAppDuo(msg);
    kirimKeSheets({ action: 'kulakan', date: formatDateShort(d), detail: msg });
    showToast('Laporan kulakan berhasil dikirim!');
  }

  document.addEventListener('DOMContentLoaded', renderKulakan);
</script>
</body>
</html>
