<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kulakan - Tsamara Florist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="nav-brand">🌸 Tsamara <span>Florist</span></span>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="penjualan.html" class="nav-link">🌿 Penjualan</a>
    <a href="kulakan.html" class="nav-link">🛒 Kulakan</a>
    <a href="pesanan.html" class="nav-link">📋 Pesanan</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="title">🛒 Daftar <span>Kulakan</span></div>
    <div class="sub">Belanja Tanaman & Kebutuhan Kios</div>
  </div>

  <div class="card orange">
    <div class="card-title">Tambah Item Kulakan</div>
    <div class="form-grid">
      <div class="form-full">
        <label>Nama Tanaman / Barang</label>
        <input type="text" id="kulakanNama" placeholder="cth: Asoka, Pot, Pupuk..." />
      </div>
      <div>
        <label>Jumlah</label>
        <input type="number" id="kulakanJumlah" placeholder="0" min="1" />
      </div>
      <div>
        <label>Satuan</label>
        <input type="text" id="kulakanSatuan" placeholder="cth: pot, pcs, kg" />
      </div>
      <div class="form-full">
        <label>Deskripsi / Catatan</label>
        <textarea id="kulakanDeskripsi" placeholder="cth: pilih yang ukuran sedang, warna merah saja..." rows="2" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:8px;"></textarea>
      </div>
    </div>
    <button class="btn btn-orange" style="width: 100%; margin-top: 15px;" onclick="addKulakan()">+ Tambah ke Daftar</button>
  </div>

  <div class="card">
    <div class="card-title">Daftar Belanja</div>
    <div id="kulakanList">
      <div class="empty-state">Daftar kulakan kosong.</div>
    </div>
    
    <div style="margin-top: 20px;">
      <button class="btn btn-dark-green" style="width: 100%;" onclick="kirimKulakanWA()">Kirim Daftar ke WA Mama</button>
    </div>
  </div>

</div>

<script src="share.js"></script>
<script>
  let kulakan = JSON.parse(localStorage.getItem('tsamara_kulakan') || '[]');

  function addKulakan() {
    const nama = document.getElementById('kulakanNama').value.trim();
    const jumlah = document.getElementById('kulakanJumlah').value.trim();
    const satuan = document.getElementById('kulakanSatuan').value.trim();
    const deskripsi = document.getElementById('kulakanDeskripsi').value.trim();

    if (!nama) { showToast('❌ Nama barang wajib diisi!', true); return; }

    kulakan.push({ id: Date.now(), nama, jumlah, satuan, deskripsi, status: 'belum' });
    simpanKulakan();
    document.getElementById('kulakanNama').value = '';
    document.getElementById('kulakanJumlah').value = '';
    document.getElementById('kulakanSatuan').value = '';
    document.getElementById('kulakanDeskripsi').value = '';
    renderKulakan();
    showToast('✅ Berhasil ditambahkan');
  }

  function toggleStatus(id) {
    const idx = kulakan.findIndex(k => k.id === id);
    if (idx > -1) {
      kulakan[idx].status = kulakan[idx].status === 'belum' ? 'sudah' : 'belum';
      simpanKulakan();
      renderKulakan();
    }
  }

  function hapusKulakan(id) {
    kulakan = kulakan.filter(k => k.id !== id);
    simpanKulakan();
    renderKulakan();
  }

  function simpanKulakan() {
    localStorage.setItem('tsamara_kulakan', JSON.stringify(kulakan));
  }

  function renderKulakan() {
    const list = document.getElementById('kulakanList');
    if (kulakan.length === 0) {
      list.innerHTML = '<div class="empty-state">Daftar kulakan masih kosong.</div>';
      return;
    }

    let html = '';
    kulakan.forEach(k => {
      const isDone = k.status === 'sudah';
      html += `
        <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px dashed #ccc; ${isDone ? 'opacity:0.5' : ''}">
          <div style="flex:1;">
            <div style="font-weight:700; ${isDone ? 'text-decoration:line-through;' : ''}">${k.nama}</div>
            <div style="font-size:0.85rem; color:#666;">
              ${k.jumlah ? `${k.jumlah} ${k.satuan}` : ''}
              ${k.deskripsi ? `<br>📝 ${k.deskripsi}` : ''}
            </div>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="btn ${isDone ? 'btn-orange' : 'btn-dark-green'}" style="padding:5px 10px; font-size:0.8rem;" onclick="toggleStatus(${k.id})">
              ${isDone ? 'Batal' : '✓ Beli'}
            </button>
            <button class="btn btn-reset text-red" onclick="hapusKulakan(${k.id})">❌</button>
          </div>
        </div>
      `;
    });
    list.innerHTML = html;
  }

  function kirimKulakanWA() {
    if (kulakan.length === 0) { showToast('Daftar masih kosong!', true); return; }

    const belum = kulakan.filter(k => k.status === 'belum');
    const sudah = kulakan.filter(k => k.status === 'sudah');
    const d = getNow();

    let msg = `*DAFTAR KULAKAN TSAMARA FLORIST*\n`;
    msg += `📅 ${formatDateLong(d)}\n`;
    msg += `━━━━━━━━━━━━━━━\n\n`;

    if (belum.length > 0) {
      msg += `*Belum Dibeli:*\n`;
      belum.forEach((k, i) => {
        msg += `${i+1}. ${k.nama}`;
        if (k.jumlah) msg += ` — ${k.jumlah} ${k.satuan}`;
        if (k.deskripsi) msg += `\n   📝 ${k.deskripsi}`;
        msg += `\n`;
      });
    }

    if (sudah.length > 0) {
      msg += `\n*Sudah Dibeli:*\n`;
      sudah.forEach((k, i) => {
        msg += `✅ ${k.nama}`;
        if (k.jumlah) msg += ` — ${k.jumlah} ${k.satuan}`;
        msg += `\n`;
      });
    }

    msg += `\n━━━━━━━━━━━━━━━\n`;
    msg += `📦 ${belum.length} belum · ✅ ${sudah.length} sudah\n`;
    msg += `\n_Tsamara Florist_ 🌸`;

    // Kirim LANGSUNG hanya ke WA Mama menggunakan utilitas sendWA di share.js
    sendWA(msg);

    // Arsip ke Sheets
    kirimKeSheets({
      tipe: 'Kulakan',
      date: formatDateShort(d),
      time: formatTime(d),
      belum: belum.length,
      sudah: sudah.length,
      detail: msg
    });
  }

  document.addEventListener('DOMContentLoaded', renderKulakan);
</script>
</body>
</html>
