<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Penjualan - Tsamara Florist</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="nav-brand">🌸 Tsamara <span>Florist</span></span>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="penjualan.html" class="nav-link">🌿 Penjualan</a>
    <a href="kulakan.html" class="nav-link">🛒 Kulakan</a>
    <a href="pesanan.html" class="nav-link">📋 Pesanan</a>
  </div>
</nav>

<div class="page">
  <header>
    <div class="logo">🌸 Tsamara <span>Florist</span></div>
    <div class="sub">Rekap Penjualan Harian</div>
  </header>

  <div class="card">
    <div class="card-title">Tambah Barang</div>

    <div class="customer-row">
      <input type="text" id="customerName" placeholder="Nama pelanggan (opsional)" />
      <span class="optional-tag">opsional</span>
    </div>

    <div class="form-grid">
      <div class="form-full">
        <label>Nama Barang</label>
        <input type="text" id="itemName" placeholder="cth: Asoka, Pot, Mawar..." />
      </div>
      <div>
        <label>Jumlah (pcs)</label>
        <input type="number" id="itemQty" placeholder="0" min="1" oninput="calcPreview()" />
      </div>
      <div>
        <label>Harga / pcs (Rp)</label>
        <input type="number" id="itemPrice" placeholder="0" min="0" oninput="calcPreview()" />
      </div>
    </div>

    <div class="preview-total" id="previewTotal"></div>
    <button class="btn btn-dark-green" style="width: 100%; margin-top: 15px;" onclick="addItem()">+ Tambah ke Rekap</button>
  </div>

  <div class="card">
    <div class="card-title">Rekap Transaksi</div>
    <div class="items-list" id="itemsList">
      <div class="empty-state" id="noItemsMsg">Belum ada barang ditambahkan</div>
    </div>
    
    <div style="margin-top: 20px; border-top: 1px dashed var(--green-pale); padding-top: 15px;">
      <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <span>Subtotal (<span id="summaryItems">0 item</span>):</span>
        <strong id="subtotalDisplay">Rp 0</strong>
      </div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <span>Diskon Tambahan (Rp):</span>
        <input type="number" id="diskonInput" placeholder="0" style="width: 120px; padding: 5px; text-align: right;" oninput="updateDiskon()" />
      </div>
      <div id="diskonResult" style="display: none; text-align: right; color: var(--red); font-weight: bold; margin-bottom: 10px;">
        <span id="diskonLabel">- Rp 0</span>
      </div>
      <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: 800; color: var(--green);">
        <span>TOTAL BAYAR:</span>
        <span id="grandTotal">Rp 0</span>
      </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button class="btn btn-orange" style="flex: 1;" onclick="simpanDanAksi('wa')">Kirim WA</button>
      <button class="btn btn-blue" style="flex: 1;" onclick="simpanDanAksi('print')">Cetak Struk</button>
    </div>
  </div>
</div>

<script src="share.js"></script>
<script src="script.js"></script>
</body>
</html>
