<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesanan - Tsamara Florist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="nav-brand">🌸 Tsamara <span>Florist</span></span>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="penjualan.html" class="nav-link">🌿 Penjualan</a>
    <a href="kulakan.html" class="nav-link">🛒 Kulakan</a>
    <a href="pesanan.html" class="nav-link">📋 Pesanan</a>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="title">📋 Pesanan <span>Customer</span></div>
    <div class="sub">Catat & Pantau Pesanan PO Toko</div>
  </div>

  <div class="card blue">
    <div class="card-title">Tambah Pesanan Pre-Order Baru</div>
    <div class="form-grid">
      <div class="form-full">
        <label>Nama Customer</label>
        <input type="text" id="pesNama" placeholder="Nama lengkap customer..." />
      </div>
      <div class="form-full">
        <label>Tanaman / Model Rangkaian Bunga</label>\n        <input type="text" id="pesTanaman" placeholder="cth: Bouquet Mawar Merah, Aglaonema Merah..." />
      </div>
      <div>
        <label>Jumlah Pesanan (Pcs)</label>
        <input type="number" id="pesJumlah" value="1" min="1" />
      </div>
      <div>
        <label>Tenggat Tanggal Pengambilan (Deadline)</label>
        <input type="date" id="pesTanggal" />
      </div>
      <div class="form-full">
        <label>Detail / Request Khusus Kustomisasi</label>\n        <input type="text" id="pesDesc" placeholder="cth: minta pita bungkus warna pink pastel, bungkus kado..." />
      </div>
    </div>
    <button class="btn btn-blue" onclick="tambahPesanan()" style="margin-top: 15px;">➕ Daftarkan Pesanan</button>
  </div>

  <div class="card">
    <div class="card-title-flex">
      <div class="filter-group">
        <button class="btn btn-sm btn-outline active" id="fBelum" onclick="setFilter('belum')">⏳ Belum Dipenuhi</button>
        <button class="btn btn-sm btn-outline" id="fSemua" onclick="setFilter('semua')">🗂️ Semua Data</button>
      </div>
    </div>
    <div id="pesananList" class="item-list-container" style="margin-top:15px;"></div>
  </div>
</div>

<script src="share.js"></script>
<script>
  let pesanan = JSON.parse(localStorage.getItem('riwayatPesanan')) || [];
  let filterMode = 'belum';

  function renderPesanan() {
    const data = filterMode === 'belum' ? pesanan.filter(p => p.status === 'belum') : pesanan;
    const el = document.getElementById('pesananList');

    if (data.length === 0) {
      el.innerHTML = `<div class="empty-state">${filterMode === 'belum' ? 'Tidak ada tanggungan pesanan aktif hari ini! 🎉' : 'Belum ada data pesanan.'}</div>`;
      return;
    }

    const today = new Date(); today.setHours(0,0,0,0);

    el.innerHTML = data.map((p, index) => {
      let badgeClass = 'badge-green';
      let labelStatus = '⏳ Diproses';

      if (p.status === 'sudah') {
        badgeClass = 'badge-gray';
        labelStatus = '✅ Selesai';
      } else if (p.tanggal) {
        const tgl = new Date(p.tanggal); tgl.setHours(0,0,0,0);
        const diff = (tgl - today) / (1000*60*60*24);
        if (diff < 0) { badgeClass = 'badge-red'; labelStatus = '🔴 Terlambat'; }
        else if (diff === 0) { badgeClass = 'badge-red'; labelStatus = '🟡 Hari Ini'; }
        else if (diff === 1) { badgeClass = 'badge-orange'; labelStatus = '🟠 Besok'; }
      }

      const tglLabel = p.tanggal ? formatDateShort(new Date(p.tanggal)) : 'Fleksibel';

      return `
        <div class="item-row" style="${p.status === 'sudah' ? 'opacity:0.55;' : ''}">
          <div class="item-info">
            <div class="item-name">👤 <strong>${p.customer}</strong></div>
            <div class="item-desc">🌿 Produk: ${p.tanaman} · <strong>${p.jumlah} pcs</strong></div>
            <div class="item-desc">📅 Ambil: <strong>${tglLabel}</strong></div>
            ${p.deskripsi ? `<div class="item-desc" style="color:var(--text); font-style:italic;">📝 Request: ${p.deskripsi}</div>` : ''}
            ${p.status === 'sudah' ? `<div class="item-desc" style="color:var(--green); font-weight:700;">✅ Diserahkan: ${p.selesaiAt}</div>` : ''}
          </div>
          <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0;">
            <span class="item-badge ${badgeClass}">${labelStatus}</span>
            <div style="display:flex; gap:6px;">
              ${p.status === 'belum' ? `<button class="btn-action btn-check" onclick="selesaikanPesanan(${index})">✔️ Selesai</button>` : ''}
              <button class="btn-action btn-del" onclick="hapusPesanan(${index})">🗑️</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
  }

  function tambahPesanan() {
    const customer = document.getElementById('pesNama').value.trim();
    const tanaman = document.getElementById('pesTanaman').value.trim();
    const jumlah = parseInt(document.getElementById('pesJumlah').value) || 0;
    const tanggal = document.getElementById('pesTanggal').value;
    const deskripsi = document.getElementById('pesDesc').value.trim();

    if (!customer || !tanaman || jumlah <= 0) {
      showToast('Mohon lengkapi Nama, Produk tanaman, dan Jumlah!', true);
      return;
    }

    pesanan.push({ customer, tanaman, jumlah, tanggal, deskripsi, status: 'belum', selesaiAt: '' });
    saveAndRender();

    // Reset Form
    document.getElementById('pesNama').value = '';
    document.getElementById('pesTanaman').value = '';
    document.getElementById('pesJumlah').value = '1';
    document.getElementById('pesTanggal').value = '';
    document.getElementById('pesDesc').value = '';
    showToast('Pesanan customer berhasil dicatat!');
  }

  function selesaikanPesanan(index) {
    const d = getNow();
    pesanan[index].status = 'sudah';
    pesanan[index].selesaiAt = `${formatDateShort(d)} ${formatTime(d)}`;
    
    // Kirim notifikasi WA singkat ke Mama jika pesanan sudah diambil
    const msg = `*PESANAN SELESAI TSAMARA FLORIST*\n👤 Pelanggan: ${pesanan[index].customer}\n🌿 Barang: ${pesanan[index].tanaman} (${pesanan[index].jumlah} pcs)\n✅ Telah diserahkan pada: ${pesanan[index].selesaiAt}\n\n_Sistem Monitoring Tsamara Florist_`;
    openWhatsAppDuo(msg);
    kirimKeSheets({ action: 'pesanan_selesai', detail: msg });

    saveAndRender();
    showToast('Pesanan selesai dipenuhi!');
  }

  function hapusPesanan(index) {
    pesanan.splice(index, 1);
    saveAndRender();
    showToast('Data pesanan dihapus.');
  }

  function setFilter(mode) {
    filterMode = mode;
    document.getElementById('fBelum').classList.toggle('active', mode === 'belum');
    document.getElementById('fSemua').classList.toggle('active', mode === 'semua');
    renderPesanan();
  }

  function saveAndRender() {
    localStorage.setItem('riwayatPesanan', JSON.stringify(pesanan));
    renderPesanan();
  }

  document.addEventListener('DOMContentLoaded', renderPesanan);
</script>
</body>
</html>
