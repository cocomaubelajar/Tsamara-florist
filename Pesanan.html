<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesanan - Tsamara Florist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="nav-brand">🌸 Tsamara <span>Florist</span></span>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="penjualan.html" class="nav-link">🌿 Penjualan</a>
    <a href="kulakan.html" class="nav-link">🛒 Kulakan</a>
    <a href="pesanan.html" class="nav-link">📋 Pesanan</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="title">📋 Pesanan <span>Customer</span></div>
    <div class="sub">Catat & Pantau Pesanan</div>
  </div>

  <!-- Form tambah pesanan -->
  <div class="card blue">
    <div class="card-title">Tambah Pesanan Baru</div>
    <div class="form-grid">
      <div class="form-full">
        <label>Nama Customer</label>
        <input type="text" id="pesNama" placeholder="Nama customer..." />
      </div>
      <div class="form-full">
        <label>Tanaman / Barang Dipesan</label>
        <input type="text" id="pesTanaman" placeholder="cth: Asoka merah, Pot besar..." />
      </div>
      <div>
        <label>Jumlah</label>
        <input type="number" id="pesJumlah" placeholder="0" min="1" />
      </div>
      <div>
        <label>Tanggal Dibutuhkan</label>
        <input type="date" id="pesTanggal" />
      </div>
      <div class="form-full">
        <label>Deskripsi / Catatan Khusus</label>
        <textarea id="pesDeskripsi" placeholder="cth: minta yang sudah berbunga, warna putih saja, diantar ke rumah..." rows="2"></textarea>
      </div>
    </div>
    <button class="btn btn-blue btn-full" onclick="addPesanan()">+ Tambah Pesanan</button>
  </div>

  <!-- Filter -->
  <div style="display:flex;gap:8px;margin-bottom:12px;">
    <button class="btn btn-full" id="filterBelum" onclick="setFilter('belum')"
      style="background:var(--blue-pale);color:#1d4ed8;font-size:0.8rem;padding:8px;">
      ⏳ Belum Dipenuhi
    </button>
    <button class="btn btn-full" id="filterSemua" onclick="setFilter('semua')"
      style="background:var(--cream-dark);color:var(--muted);font-size:0.8rem;padding:8px;">
      📋 Semua
    </button>
  </div>

  <!-- List pesanan -->
  <div class="card">
    <div class="card-title">Daftar Pesanan</div>
    <div id="pesananList"><div class="empty-state">Belum ada pesanan</div></div>
  </div>

</div>

<script src="shared.js"></script>
<script>
  const PESANAN_KEY = 'tsamara_pesanan';
  let filterMode = 'belum';

  function getPesanan() {
    try { return JSON.parse(localStorage.getItem(PESANAN_KEY)) || []; }
    catch { return []; }
  }

  function savePesanan(data) {
    localStorage.setItem(PESANAN_KEY, JSON.stringify(data));
  }

  function setFilter(mode) {
    filterMode = mode;
    document.getElementById('filterBelum').style.background = mode === 'belum' ? '#3a86ff' : 'var(--cream-dark)';
    document.getElementById('filterBelum').style.color = mode === 'belum' ? 'white' : 'var(--muted)';
    document.getElementById('filterSemua').style.background = mode === 'semua' ? 'var(--green)' : 'var(--cream-dark)';
    document.getElementById('filterSemua').style.color = mode === 'semua' ? 'white' : 'var(--muted)';
    renderPesanan();
  }

  function addPesanan() {
    const nama = document.getElementById('pesNama').value.trim();
    const tanaman = document.getElementById('pesTanaman').value.trim();
    const jumlah = document.getElementById('pesJumlah').value;
    const tanggal = document.getElementById('pesTanggal').value;
    const deskripsi = document.getElementById('pesDeskripsi').value.trim();

    if (!nama) { showToast('❌ Nama customer harus diisi', true); return; }
    if (!tanaman) { showToast('❌ Tanaman harus diisi', true); return; }

    const data = getPesanan();
    const entry = {
      id: Date.now(),
      customer: nama,
      tanaman,
      jumlah: jumlah || '1',
      tanggal,
      deskripsi,
      status: 'belum',
      createdAt: formatDateLong(getNow())
    };
    data.unshift(entry);
    savePesanan(data);

    // Kirim notif WA
    kirimNotifPesanan(entry, 'baru');

    // Arsip ke Sheets
    kirimKeSheets({
      type: 'pesanan_baru',
      ...entry,
      date: formatDateLong(getNow()),
      time: formatTime(getNow())
    });

    document.getElementById('pesNama').value = '';
    document.getElementById('pesTanaman').value = '';
    document.getElementById('pesJumlah').value = '';
    document.getElementById('pesTanggal').value = '';
    document.getElementById('pesDeskripsi').value = '';

    renderPesanan();
    showToast('✅ Pesanan ditambahkan & notif terkirim!');
  }

  function kirimNotifPesanan(p, tipe) {
    const tglLabel = p.tanggal
      ? `📅 Dibutuhkan: ${formatDateShort(new Date(p.tanggal))}`
      : `📅 Tanggal belum ditentukan`;

    let msg = '';
    if (tipe === 'baru') {
      msg = `📋 *PESANAN BARU - TSAMARA FLORIST*\n`;
      msg += `━━━━━━━━━━━━━━━\n`;
      msg += `👤 Customer  : ${p.customer}\n`;
      msg += `🌿 Pesanan   : ${p.tanaman}\n`;
      msg += `📦 Jumlah    : ${p.jumlah} pcs\n`;
      msg += `${tglLabel}\n`;
      if (p.deskripsi) msg += `📝 Catatan   : ${p.deskripsi}\n`;
      msg += `━━━━━━━━━━━━━━━\n`;
      msg += `_Tsamara Florist_ 🌸`;
    } else if (tipe === 'selesai') {
      msg = `✅ *PESANAN SELESAI - TSAMARA FLORIST*\n`;
      msg += `━━━━━━━━━━━━━━━\n`;
      msg += `👤 Customer : ${p.customer}\n`;
      msg += `🌿 Pesanan  : ${p.tanaman} (${p.jumlah} pcs)\n`;
      msg += `✅ Status   : Sudah dipenuhi\n`;
      msg += `━━━━━━━━━━━━━━━\n`;
      msg += `_Tsamara Florist_ 🌸`;
    }

    window.open(`https://wa.me/${MY_WA}?text=${encodeURIComponent(msg)}`, '_blank');
    setTimeout(() => window.open(`https://wa.me/${MAMA_WA}?text=${encodeURIComponent(msg)}`, '_blank'), 800);
  }

  function selesaikanPesanan(id) {
    customConfirm('Tandai pesanan ini sudah dipenuhi?', (ok) => {
      if (!ok) return;
      const data = getPesanan();
      const item = data.find(p => p.id === id);
      if (item) {
        item.status = 'sudah';
        item.selesaiAt = formatDateLong(getNow());
        savePesanan(data);
        kirimNotifPesanan(item, 'selesai');
        kirimKeSheets({ type: 'pesanan_selesai', id, selesaiAt: item.selesaiAt });
        renderPesanan();
        showToast('✅ Pesanan ditandai selesai & notif terkirim!');
      }
    });
  }

  function hapusPesanan(id) {
    customConfirm('Hapus pesanan ini?', (ok) => {
      if (!ok) return;
      savePesanan(getPesanan().filter(p => p.id !== id));
      renderPesanan();
      showToast('🗑️ Pesanan dihapus');
    });
  }

  function getStatusInfo(p) {
    if (p.status === 'sudah') return { label: '✅ Selesai', cls: 'badge-green' };
    if (!p.tanggal) return { label: '⏳ Belum', cls: 'badge-blue' };
    const today = new Date(); today.setHours(0,0,0,0);
    const tgl = new Date(p.tanggal); tgl.setHours(0,0,0,0);
    const diff = Math.round((tgl - today) / (1000*60*60*24));
    if (diff < 0) return { label: '🔴 Sudah Lewat', cls: 'badge-red status-lewat' };
    if (diff === 0) return { label: '🟡 Hari Ini!', cls: 'badge-orange status-belum' };
    if (diff === 1) return { label: '🟠 Besok', cls: 'badge-orange status-belum' };
    return { label: `⏳ ${diff} hari lagi`, cls: 'badge-blue' };
  }

  function renderPesanan() {
    const all = getPesanan();
    const data = filterMode === 'belum' ? all.filter(p => p.status === 'belum') : all;
    const el = document.getElementById('pesananList');

    if (data.length === 0) {
      el.innerHTML = `<div class="empty-state">${filterMode === 'belum' ? 'Tidak ada pesanan yang belum dipenuhi 🎉' : 'Belum ada pesanan'}</div>`;
      return;
    }

    el.innerHTML = data.map(p => {
      const st = getStatusInfo(p);
      const tglLabel = p.tanggal ? formatDateShort(new Date(p.tanggal)) : 'Tanggal belum ditentukan';
      return `
        <div class="item-row" style="${p.status === 'sudah' ? 'opacity:0.6;' : ''}">
          <div class="item-info">
            <div class="item-name">👤 ${p.customer}</div>
            <div class="item-desc">🌿 ${p.tanaman} · ${p.jumlah} pcs</div>
            <div class="item-desc">📅 ${tglLabel}</div>
            ${p.deskripsi ? `<div class="item-desc">📝 ${p.deskripsi}</div>` : ''}
            ${p.status === 'sudah' ? `<div class="item-desc">✅ Selesai: ${p.selesaiAt}</div>` : ''}
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;">
            <span class="item-badge ${st.cls}">${st.label}</span>
            ${p.status === 'belum' ? `<button class="btn btn-green" style="font-size:0.72rem;padding:5px 10px;" onclick="selesaikanPesanan(${p.id})">✅ Selesai</button>` : ''}
            <button class="btn-del" onclick="hapusPesanan(${p.id})">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  setFilter('belum');
</script>
</body>
</html>
