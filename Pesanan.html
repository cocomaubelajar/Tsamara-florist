<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesanan - Tsamara Florist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="nav-brand">🌸 Tsamara <span>Florist</span></span>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="penjualan.html" class="nav-link">🌿 Penjualan</a>
    <a href="kulakan.html" class="nav-link">🛒 Kulakan</a>
    <a href="pesanan.html" class="nav-link">📋 Pesanan</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="title">📋 Pesanan <span>Customer</span></div>
    <div class="sub">Catat & Pantau Pesanan</div>
  </div>

  <div class="card blue">
    <div class="card-title">Tambah Pesanan Baru</div>
    <div class="form-grid">
      <div class="form-full">
        <label>Nama Customer</label>
        <input type="text" id="pesNama" placeholder="Nama customer..." />
      </div>
      <div class="form-full">
        <label>Tanaman / Barang Dipesan</label>
        <input type="text" id="pesTanaman" placeholder="cth: Asoka merah, Pot besar..." />
      </div>
      <div>
        <label>Jumlah</label>
        <input type="number" id="pesJumlah" placeholder="0" min="1" />
      </div>
      <div>
        <label>Tanggal Dibutuhkan</label>
        <input type="date" id="pesTanggal" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;" />
      </div>
      <div class="form-full">
        <label>Deskripsi / Catatan Khusus</label>
        <textarea id="pesDeskripsi" placeholder="cth: Minta pot yang sudah dicat..." rows="2" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;"></textarea>
      </div>
    </div>
    <button class="btn btn-blue" style="width: 100%; margin-top: 15px;" onclick="addPesanan()">+ Simpan Pesanan</button>
  </div>

  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <div class="card-title" style="margin: 0;">Daftar Pesanan</div>
      <select id="filterPesanan" onchange="renderPesanan()" style="padding: 5px; border-radius: 5px; border: 1px solid #ccc;">
        <option value="semua">Semua Pesanan</option>
        <option value="belum">Belum Selesai</option>
        <option value="sudah">Selesai</option>
      </select>
    </div>
    
    <div id="pesananList">
      <div class="empty-state">Belum ada pesanan</div>
    </div>
  </div>

</div>

<script src="share.js"></script>
<script>
  let pesanan = JSON.parse(localStorage.getItem('tsamara_pesanan') || '[]');

  function addPesanan() {
    const customer = document.getElementById('pesNama').value.trim();
    const tanaman = document.getElementById('pesTanaman').value.trim();
    const jumlah = document.getElementById('pesJumlah').value.trim();
    const tanggal = document.getElementById('pesTanggal').value;
    const deskripsi = document.getElementById('pesDeskripsi').value.trim();

    if (!customer || !tanaman) { showToast('❌ Nama customer & pesanan wajib diisi!', true); return; }

    pesanan.push({
      id: Date.now(),
      customer, tanaman, jumlah, tanggal, deskripsi,
      status: 'belum',
      createdAt: formatDateShort(getNow())
    });

    simpanPesanan();
    document.getElementById('pesNama').value = '';
    document.getElementById('pesTanaman').value = '';
    document.getElementById('pesJumlah').value = '';
    document.getElementById('pesTanggal').value = '';
    document.getElementById('pesDeskripsi').value = '';
    
    document.getElementById('filterPesanan').value = 'semua';
    renderPesanan();
    showToast('✅ Pesanan berhasil dicatat');
  }

  function selesaikanPesanan(id) {
    initConfirm('Tandai pesanan ini selesai dan beritahu Mama via WA?', () => {
      const idx = pesanan.findIndex(p => p.id === id);
      if (idx > -1) {
        pesanan[idx].status = 'sudah';
        pesanan[idx].selesaiAt = formatDateShort(getNow());
        simpanPesanan();
        renderPesanan();
        
        // Kirim notif WA otomatis ke Mama
        const p = pesanan[idx];
        const msg = `✅ *PESANAN SELESAI*\n\nCustomer: ${p.customer}\nPesanan: ${p.tanaman} (${p.jumlah})\nStatus: Sudah disiapkan/diambil.`;
        sendWA(msg);
      }
    });
  }

  function hapusPesanan(id) {
    initConfirm('Yakin ingin menghapus data pesanan ini?', () => {
      pesanan = pesanan.filter(p => p.id !== id);
      simpanPesanan();
      renderPesanan();
    });
  }

  function simpanPesanan() {
    localStorage.setItem('tsamara_pesanan', JSON.stringify(pesanan));
  }

  function renderPesanan() {
    const filterMode = document.getElementById('filterPesanan').value;
    const el = document.getElementById('pesananList');
    
    let data = pesanan;
    if (filterMode !== 'semua') {
      data = pesanan.filter(p => p.status === filterMode);
    }

    if (data.length === 0) {
      el.innerHTML = `<div class="empty-state">${filterMode === 'belum' ? 'Tidak ada pesanan yang tertunda 🎉' : 'Belum ada pesanan'}</div>`;
      return;
    }

    let html = '';
    data.forEach(p => {
      const isSelesai = p.status === 'sudah';
      const tglLabel = p.tanggal ? formatDateShort(new Date(p.tanggal)) : 'Tgl tidak ditentukan';
      
      html += `
        <div style="padding: 12px; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; background: ${isSelesai ? '#f9f9f9' : '#fff'};">
          <div style="display: flex; justify-content: space-between;">
            <div style="font-weight: 700; color: var(--green); margin-bottom: 5px;">👤 ${p.customer}</div>
            <div style="font-size: 0.8rem; padding: 2px 8px; border-radius: 12px; background: ${isSelesai ? 'var(--green-pale)' : '#ffe4e4'}; color: ${isSelesai ? 'var(--green)' : 'var(--red)'}; height: max-content;">
              ${isSelesai ? 'Selesai' : 'Belum'}
            </div>
          </div>
          <div style="font-size: 0.9rem; color: #444; margin-bottom: 4px;">🌿 ${p.tanaman} (${p.jumlah || 1} pcs)</div>
          <div style="font-size: 0.85rem; color: #666; margin-bottom: 4px;">📅 Deadline: ${tglLabel}</div>
          ${p.deskripsi ? `<div style="font-size: 0.85rem; color: #666; font-style: italic; margin-bottom: 8px;">📝 "${p.deskripsi}"</div>` : ''}
          
          <div style="display: flex; gap: 8px; margin-top: 10px;">
            ${!isSelesai ? `<button class="btn btn-blue" style="flex:1; padding:6px;" onclick="selesaikanPesanan(${p.id})">Tandai Selesai</button>` : ''}
            <button class="btn btn-reset text-red" style="padding:6px; border: 1px solid #ddd; border-radius:6px;" onclick="hapusPesanan(${p.id})">Hapus</button>
          </div>
        </div>
      `;
    });
    
    el.innerHTML = html;
  }

  document.addEventListener('DOMContentLoaded', renderPesanan);
</script>
</body>
</html>
