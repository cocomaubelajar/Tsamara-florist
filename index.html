<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Tsamara Florist</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <span class="nav-brand">🌸 Tsamara <span>Florist</span></span>
    <a href="index.html" class="nav-link">🏠 Dashboard</a>
    <a href="penjualan.html" class="nav-link">🌿 Penjualan</a>
    <a href="kulakan.html" class="nav-link">🛒 Kulakan</a>
    <a href="pesanan.html" class="nav-link">📋 Pesanan</a>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="title">🌸 Tsamara <span>Florist</span></div>
    <div class="sub">Dashboard Harian</div>
  </div>

  <div class="quote-box" style="background: var(--green); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center;">
    <div class="quote-text" id="quoteText" style="font-style: italic; margin-bottom: 5px;">"Semangat berjualan hari ini, rezeki sudah ada yang mengatur."</div>
    <div class="quote-sub" id="quoteDate" style="font-size: 0.8rem; opacity: 0.8;">—</div>
  </div>

  <div class="card" style="margin-bottom: 20px;">
    <div class="card-title">Ringkasan Hari Ini</div>
    <div style="font-size: 2rem; font-weight: 800; color: var(--green); text-align: center; margin-top: 10px;" id="dashPendapatan">
      Rp 0
    </div>
    <div style="text-align: center; font-size: 0.9rem; color: var(--muted); margin-bottom: 10px;">
      Total Pendapatan (Penjualan)
    </div>
  </div>

  <div class="card" id="cardPesananDesak" style="display: none; border-left: 4px solid var(--red);">
    <div class="card-title" style="color: var(--red);">⚠️ Reminder Pesanan!</div>
    <div id="listPesananDesak"></div>
  </div>

</div>

<script src="share.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Tampilkan tanggal hari ini
    document.getElementById('quoteDate').textContent = formatDateLong(getNow());

    // Kalkulasi total pendapatan hari ini dari LocalStorage
    try {
      const salesLog = JSON.parse(localStorage.getItem('tsamara_sales_log') || '[]');
      const todayShort = formatDateShort(getNow());
      
      const pendapatanHariIni = salesLog
        .filter(log => log.date === todayShort)
        .reduce((sum, log) => sum + log.finalTotal, 0);

      document.getElementById('dashPendapatan').textContent = formatRp(pendapatanHariIni);
    } catch (e) {
      console.warn("Gagal membaca log penjualan", e);
    }

    // Cek pesanan yang mendesak (deadline hari ini atau lewat)
    try {
      const pesananLog = JSON.parse(localStorage.getItem('tsamara_pesanan') || '[]');
      const belumSelesai = pesananLog.filter(p => p.status === 'belum' && p.tanggal);
      
      const today = new Date(); 
      today.setHours(0,0,0,0);
      
      const desak = belumSelesai.filter(p => {
        const tgl = new Date(p.tanggal); tgl.setHours(0,0,0,0);
        const diff = (tgl - today) / (1000 * 60 * 60 * 24);
        return diff <= 1; // Deadline hari ini, besok, atau sudah lewat
      });

      if (desak.length > 0) {
        document.getElementById('cardPesananDesak').style.display = 'block';
        
        let html = '';
        desak.forEach(p => {
          const tgl = new Date(p.tanggal); tgl.setHours(0,0,0,0);
          const diff = Math.round((tgl - today) / (1000 * 60 * 60 * 24));
          const label = diff < 0 ? '🔴 Lewat Deadline' : diff === 0 ? '🟡 Hari Ini' : '🟠 Besok';
          
          html += `
            <div style="padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
              <div>
                <div style="font-weight: bold;">${p.customer}</div>
                <div style="font-size: 0.85rem; color: #555;">${p.tanaman} (${p.jumlah} pcs)</div>
              </div>
              <div style="font-size: 0.75rem; padding: 4px 8px; border-radius: 4px; background: #ffe4e4; color: var(--red); font-weight: bold;">
                ${label}
              </div>
            </div>
          `;
        });
        document.getElementById('listPesananDesak').innerHTML = html;
      }
    } catch(e) {
      console.warn("Gagal membaca log pesanan", e);
    }
  });
</script>
</body>
</html>
